<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMBER GYM</title>
    <link rel="icon" type="img/png" href="ChatGPT Image Feb 8, 2026, 05_26_38 PM.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=delete" />
</head>
<body>
    <!-- start -->
     <div class="container">
        <div class="form-daftar">
            <div class="judul">
                <h2>FORM DAFTAR</h2>
                <h4 class="logo">
                <img src="ChatGPT Image Feb 8, 2026, 05_26_38 PM.png" alt="logo" width="70px">
                GYM SKUY
                </h4>
            </div>
            <form id="inputData" class="input-data">
                <div class="input-nama">
                <label for="namaku">Nama :</label>
                <input type="text" id="namaku" required>
                </div>
                <div class="input-umur">
                <label for="umur">Umur :</label>
                <input type="number" id="umur" required>
                </div>
                <div class="jeniskelamin">
                <input type="radio" id="laki" name="gender" value="Male">
                <label for="laki">Male</label>
                <input type="radio" id="perempuan" name="gender" value="Female">
                <label for="Female">Female</label>
                </div>
                <div class="date">
                <label for="tanggal">Tanggal :</label>
                <input type="date" id="tanggal">
                </div>
                <label for="Alamat">Alamat :</label>
                <textarea placeholder="Masukan Alamat"  id="alamat" required></textarea>
                <button type="submit" >ADD</button>
            </form>
        </div>
        <div class="listmember">
            <div class="header">
                <h1>DATA PENDAFTAR</h1>
                <h6>list pendaftaran member sedang aktif</h6>
            </div>
            <div class="batas">
            <div id="list">
            </div>
            </div>
        </div>
     </div>
     <!-- end -->
    <SCript src="script.js"></SCript>
</body>
</html>
